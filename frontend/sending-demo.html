<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sending 图标对比</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 40px;
  }
  h2 { margin-top: 48px; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .row {
    display: flex;
    align-items: center;
    gap: 24px;
    margin: 20px 0;
    padding: 16px 20px;
    background: #22223a;
    border-radius: 8px;
  }
  .label {
    font-weight: 600;
    min-width: 140px;
    color: #aaa;
  }
  .bubble {
    background: #3b82f6;
    color: white;
    padding: 10px 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
  }

  /* A: 实心圆旋转 */
  .icon-a {
    font-size: 14px;
    animation: spin 1.5s linear infinite;
    opacity: 0.7;
  }

  /* B: 三点脉冲 */
  .icon-b {
    display: flex;
    gap: 3px;
  }
  .icon-b span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.8);
    animation: dotPulse 1.4s ease-in-out infinite both;
  }
  .icon-b span:nth-child(2) { animation-delay: 0.2s; }
  .icon-b span:nth-child(3) { animation-delay: 0.4s; }

  /* C: CSS 圆环 */
  .icon-c {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: rgba(255,255,255,0.9);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* D: 原始 + 脉冲放大 */
  .icon-d {
    font-size: 20px;
    animation: spin 1.5s linear infinite, pulseScale 1s ease-in-out infinite;
    opacity: 0.9;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1); }
  }
  @keyframes pulseScale {
    0%, 100% { transform: rotate(0deg) scale(0.8); }
    50%      { transform: rotate(180deg) scale(1.2); }
  }

  /* 对比：原始 */
  .icon-original {
    font-size: 14px;
    animation: spin 1.5s linear infinite;
    opacity: 0.7;
    color: rgba(255,255,255,0.9);
  }
</style>
</head>
<body>

<h1>Sending 状态图标 — 方案对比</h1>

<h2>当前效果</h2>
<div class="row">
  <span class="label">◌ 虚线圆</span>
  <div class="bubble">
    我的消息
    <span class="icon-original">◌</span>
  </div>
</div>

<h2>方案 A — 实心圆 ◉</h2>
<div class="row">
  <span class="label">◉ 实心目标圆</span>
  <div class="bubble">
    我的消息
    <span class="icon-a">◉</span>
  </div>
</div>
<div class="row">
  <span class="label">● 实心圆</span>
  <div class="bubble">
    我的消息
    <span class="icon-a">●</span>
  </div>
</div>

<h2>方案 B — 三点脉冲</h2>
<div class="row">
  <span class="label">...</span>
  <div class="bubble">
    我的消息
    <span class="icon-b"><span></span><span></span><span></span></span>
  </div>
</div>

<h2>方案 C — CSS 圆环 spinner</h2>
<div class="row">
  <span class="label">border spinner</span>
  <div class="bubble">
    我的消息
    <span class="icon-c"></span>
  </div>
</div>

<h2>方案 D — 增大 + 脉冲</h2>
<div class="row">
  <span class="label">◌ 20px + pulse</span>
  <div class="bubble">
    我的消息
    <span class="icon-d">◌</span>
  </div>
</div>

</body>
</html>
