services:
  web-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: web-agent:latest
    container_name: web-agent
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
      - .env.production
    environment:
      - HOST_DATA_ROOT=${HOST_DATA_ROOT:-/home/ubuntu/web-agent/data}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - ./logs:/app/logs
    user: root  # Required for Docker socket access (per-user container management)
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux Docker Engine fallback
    restart: unless-stopped

volumes:
  web-agent-data:
    driver: local
