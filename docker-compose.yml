services:
  # Main server: container orchestration, WebSocket bridge, API endpoints
  main-server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Data root — shared across all containers and services
      - ./data:/data
      # Docker socket — for container management (Phase 2)
      - /var/run/docker.sock:/var/run/docker.sock
      # Source code for development (hot reload)
      - ./main_server.py:/app/main_server.py
      - ./agent_server.py:/app/agent_server.py
      - ./src:/app/src
    environment:
      - DATA_ROOT=/data
      - LOG_LEVEL=debug
      # Phase 2: Container mode toggle (default: off for dev)
      - CONTAINER_MODE=false
      # Phase 2: JWT auth (default: off for dev)
      - ENFORCE_AUTH=false
      - JWT_SECRET=dev-secret-change-in-production-use-at-least-32-chars
      # Phase 2: Admin role enforcement (default: off for dev)
      - ENFORCE_ADMIN=false
      # Phase 2: Log directories
      - AUDIT_LOG_DIR=/data/logs/audit
      - APP_LOG_DIR=/data/logs/app
      - AGENT_LOG_DIR=/data/logs/agent
      - APP_LOG_RETENTION_DAYS=30
      - AGENT_LOG_RETENTION_DAYS=90
      - AUDIT_LOG_RETENTION_DAYS=1095
      # Phase 5: Sandbox
      - SANDBOX_MODE=stub
    command: >
      uvicorn main_server:app
      --host 0.0.0.0
      --port 8080
      --reload
      --reload-dir /app
    restart: unless-stopped

volumes:
  data:
    driver: local
